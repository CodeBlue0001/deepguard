version: '3.9'

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./deepguard.db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=false
    volumes:
      - model_weights:/app/model/weights
      - db_data:/app
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A training.tasks worker --loglevel=info --concurrency=1
    environment:
      - DATABASE_URL=sqlite:///./deepguard.db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - model_weights:/app/model/weights
      - db_data:/app
    depends_on:
      - redis
      - api

volumes:
  redis_data:
  model_weights:
  db_data:
